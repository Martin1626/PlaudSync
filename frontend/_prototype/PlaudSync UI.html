  html, body, #root { height: 100%; }

  .font-mono { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }

  /* Pulsing dot for running */
  @keyframes ps-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.55; transform: scale(0.85); }
  }
  .ps-pulse { animation: ps-pulse 1.4s ease-in-out infinite; }

  /* Indeterminate progress bar */
  @keyframes ps-indeterminate {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(400%); }
  }
  .ps-indeterminate {
    animation: ps-indeterminate 1.6s ease-in-out infinite;
    width: 25%;
  }

  /* Toast slide-in */
  @keyframes ps-toast-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .ps-toast-in { animation: ps-toast-in 180ms ease-out; }

  /* YAML editor — line numbers + textarea share metrics */

    line-height: 20px;

  ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* focus ring polish */
  button:focus-visible, a:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
    outline: 2px solid #2563eb;
    outline-offset: 2px;

const DEFAULT_YAML = `# PlaudSync configuration — spec v0.2 (per-project absolute paths)
#
# Categorization is single-layer regex on the recording title. Title format:
#     (YYYY-)?MM-DD <separator> <Project>: <rest>
# Example titles:
#     04-25 ProjektAlfa: Kickoff
#     2026-04-25 KlientBeta: status update
# The captured "Project" name must match a key in 'projects' below; otherwise
# the recording lands under unclassified_dir/_unmapped_<project>/.

# Cílová absolutní cesta pro nahrávky bez project labelu (title nematchne)
# nebo s project labelem, který není v 'projects' (soft fallback).
unclassified_dir: D:\\Recordings\\Unclassified

# Per-project absolutní cesty. Každý projekt může být na jiném drive — žádný
# společný kořen. Klíč musí přesně odpovídat captured "Project" v titulku
# (case-sensitive, Unicode word + space allowed).
projects:
  ProjektAlfa: C:\\Projects\\Alpha\\Recordings
  KlientBeta: D:\\Clients\\Beta\\Audio
  Interní: E:\\Work\\Interni
`;

/* ============================================================
 * UTIL — relative time, formatters, classnames
 * ============================================================ */

function classNames(...xs) { return xs.filter(Boolean).join(" "); }

function relativeTime(iso, nowIso = NOW) {
  if (!iso) return null;
  const a = new Date(iso).getTime();
  const b = new Date(nowIso).getTime();
  const diffMin = Math.round((b - a) / 60000);
  if (diffMin < 1) return "právě teď";
  if (diffMin < 60) return `před ${diffMin} min`;
  const hours = Math.round(diffMin / 60);
  if (hours < 24) return `před ${hours} h`;
  const days = Math.round(hours / 24);
  if (days === 1) return "včera";
  if (days < 7) return `před ${days} dny`;
  const d = new Date(iso);
  return d.toLocaleDateString("cs-CZ", { month: "short", day: "numeric" });
}

function formatExactTime(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleString("cs-CZ", {
    day: "numeric", month: "short",
    hour: "2-digit", minute: "2-digit",
  });
}

function phaseLabel(p) {
  if (!p) return "Pracuji…";
  const { phase, processed_count, total_count } = p;
  switch (phase) {
    case "listing":      return "Načítám seznam nahrávek…";
    case "downloading":  return `Stahuji ${processed_count} z ${total_count}`;
    case "categorizing": return `Kategorizuji ${processed_count} z ${total_count}`;
    case "finalizing":   return "Ukládám metadata…";
    default:             return "Pracuji…";
  }
}

/* ============================================================
 * APP STATE — single store simulating TanStack Query + scenario switch
 * ============================================================ */

function useAppStore() {
  const [scenarioKey, setScenarioKey] = useState("idle");
  const [serverState, setServerState] = useState(SCENARIOS.idle.state);
  const [toasts, setToasts] = useState([]);
  const [banners, setBanners] = useState([]); // { id, variant, title, message, action? }
  const [dismissedBanners, setDismissedBanners] = useState(new Set());
  const [connectionLost, setConnectionLost] = useState(false);
  const [route, setRoute] = useState("dashboard"); // 'dashboard' | 'settings'

  // YAML config + parse error
  const [yaml, setYaml] = useState(DEFAULT_YAML);
  const [yamlError, setYamlError] = useState(null); // { line, message } | null
  const [savingConfig, setSavingConfig] = useState(false);
  const [verifyingAuth, setVerifyingAuth] = useState(false);

  const toastIdRef = useRef(0);
  const bannerIdRef = useRef(0);

  /* ---- toasts ---- */
  const pushToast = useCallback((variant, message) => {
    const id = ++toastIdRef.current;
    setToasts(t => [...t, { id, variant, message }]);
    setTimeout(() => {
      setToasts(t => t.filter(x => x.id !== id));
    }, 4000);
  }, []);
  const dismissToast = (id) => setToasts(t => t.filter(x => x.id !== id));

  /* ---- banners ---- */
  const setBannersFromState = (s) => {
    const next = [];
    if (s.sync.last_run_outcome === "failed") {
      next.push({
        id: "last-sync-failed",
        variant: "error",
        title: "Poslední synchronizace selhala",
        message: s.sync.last_error_summary || "Synchronizace nedoběhla.",
        actionLabel: "Zobrazit log",
      });
    } else if (s.sync.last_run_outcome === "partial_failure") {
      next.push({
        id: "last-sync-partial",
        variant: "warning",
        title: "Poslední synchronizace měla chyby",
        message: s.sync.last_error_summary || "Některé nahrávky se nepodařilo stáhnout.",
        actionLabel: "Zobrazit log",
      });
    }
    setBanners(next.filter(b => !dismissedBanners.has(b.id)));
  };

  const dismissBanner = (id) => {
    setDismissedBanners(prev => new Set(prev).add(id));
    setBanners(b => b.filter(x => x.id !== id));
  };

  const forceBanner = (kind) => {
    let banner;
    if (kind === "token-expired") {
      banner = {
        id: "token-expired",
        variant: "error",
        title: "Token vypršel",
        message: "Zkopíruj znovu localStorage.tokenstr z app.plaud.ai do souboru .env.",
        actionLabel: "Otevřít Nastavení",
        actionTarget: "settings",
      };
    } else if (kind === "last-sync-failed") {
      banner = {
        id: "last-sync-failed-forced",
        variant: "error",
        title: "Poslední synchronizace selhala",
        message: "Síť nedostupná při načítání seznamu nahrávek.",
        actionLabel: "Zobrazit log",
      };
    }
    if (banner) {
      setBanners(b => b.find(x => x.id === banner.id) ? b : [...b, banner]);
    }
  };

  /* ---- scenario switching ---- */
  const switchScenario = (key) => {
    setScenarioKey(key);
    const s = SCENARIOS[key].state;
    setServerState(s);
    setDismissedBanners(new Set());
    // banners derived after dismissed reset
    setTimeout(() => setBannersFromState(s), 0);
  };

  // recompute banners whenever serverState changes (and dismissed list)
  useEffect(() => {
    setBannersFromState(serverState);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [serverState, dismissedBanners]);

  /* ---- mutations (mocked) ---- */
  const startSync = useCallback(() => {
    if (serverState.sync.status === "running") return;
    // Transition to running
    const startedAt = new Date().toISOString();
    setServerState(prev => ({
      ...prev,
      sync: {
        status: "running", trigger: "ui_sync_now",
        started_at: startedAt,
        last_run_at: prev.sync.last_run_at,
        last_run_outcome: prev.sync.last_run_outcome,
        last_run_exit_code: prev.sync.last_run_exit_code,
        last_error_summary: prev.sync.last_error_summary,
        progress: { phase: "listing", processed_count: null, total_count: null },
      },
    }));

    // Simulate phases
    let timeouts = [];
    timeouts.push(setTimeout(() => {
      setServerState(prev => ({
        ...prev,
        sync: { ...prev.sync, progress: { phase: "downloading", processed_count: 1, total_count: 5 } },
      }));
    }, 900));
    [2,3,4,5].forEach((n, i) => {
      timeouts.push(setTimeout(() => {
        setServerState(prev => ({
          ...prev,
          sync: { ...prev.sync, progress: { phase: "downloading", processed_count: n, total_count: 5 } },
          recordings: [
            {
              plaud_id: `rec_new_${n}`,
              title: `04-25 Nová nahrávka ${n}`,
              created_at: NOW,
              downloaded_at: new Date().toISOString(),
              plaud_folder: n % 2 === 0 ? "Meetings/ProjektAlfa" : "Inbox",
              classification_status: n % 2 === 0 ? "matched" : "unclassified",
              project: n % 2 === 0 ? "ProjektAlfa" : null,
              target_dir: n % 2 === 0 ? "C:\\Projects\\Alpha\\Recordings" : "D:\\Recordings\\Unclassified\\Inbox",
              status: "downloaded",
            },
            ...prev.recordings,
          ].slice(0, 50),
        }));
      }, 1400 + i * 600));
    });
    timeouts.push(setTimeout(() => {
      setServerState(prev => ({
        ...prev,
        sync: { ...prev.sync, progress: { phase: "categorizing", processed_count: 5, total_count: 5 } },
      }));
    }, 4200));
    timeouts.push(setTimeout(() => {
      setServerState(prev => ({
        ...prev,
        sync: { ...prev.sync, progress: { phase: "finalizing", processed_count: null, total_count: null } },
      }));
    }, 4900));
    timeouts.push(setTimeout(() => {
      setServerState(prev => {
        const newCount = prev.recordings.filter(r => r.plaud_id.startsWith("rec_new_")).length;
        // Toast on transition
        setTimeout(() => pushToast("success", `Synchronizace dokončena — ${newCount} nových nahrávek`), 0);
        return {
          ...prev,
          sync: {
            status: "idle", trigger: null, started_at: null,
            last_run_at: new Date().toISOString(),
            last_run_outcome: "success", last_run_exit_code: 0,
            last_error_summary: null, progress: null,
          },
        };
      });
    }, 5500));

    return () => timeouts.forEach(clearTimeout);
  }, [serverState.sync.status, pushToast]);

  const verifyAuth = useCallback((shouldFail) => {
    setVerifyingAuth(true);
    setTimeout(() => {
      setVerifyingAuth(false);
      if (shouldFail) {
        forceBanner("token-expired");
        pushToast("error", "Ověření tokenu selhalo");
      } else {
        pushToast("success", "Token ověřen");
      }
    }, 700);
  }, [pushToast]);

  const saveConfig = useCallback(() => {
    setSavingConfig(true);
    setTimeout(() => {
      setSavingConfig(false);
      // Naive YAML pseudo-validation: detect tabs or stray ":" weirdness
      const lines = yaml.split("\n");
      let errLine = -1, errMsg = "";
      for (let i = 0; i < lines.length; i++) {
        if (/^\t/.test(lines[i])) { errLine = i + 1; errMsg = "Pro odsazení používej mezery, ne tabulátory."; break; }
      }
      if (errLine > 0) {
        setYamlError({ line: errLine, message: errMsg });
        pushToast("error", `Konfigurace je neplatná — řádek ${errLine}`);
      } else {
        setYamlError(null);
        pushToast("success", "Konfigurace uložena");
      }
    }, 600);
  }, [yaml, pushToast]);

  return {
    scenarioKey, switchScenario,
    serverState,
    toasts, pushToast, dismissToast,
    banners, dismissBanner, forceBanner,
    connectionLost, setConnectionLost,
    route, setRoute,
    yaml, setYaml, yamlError, setYamlError,
    savingConfig, verifyingAuth,
    startSync, verifyAuth, saveConfig,
  };
}

function SyncStatusBadge({ sync }) {
  let dot, label;
  if (sync.status === "running") {
    dot = <span className="w-2 h-2 rounded-full bg-blue-500 ps-pulse" />;
    label = phaseLabel(sync.progress);
  } else if (sync.last_run_outcome === "failed") {
    dot = <span className="w-2 h-2 rounded-full bg-red-500" />;
    label = "Poslední synchronizace selhala";
  } else if (sync.last_run_outcome === "partial_failure") {
    dot = <span className="w-2 h-2 rounded-full bg-amber-500" />;
    label = `Poslední sync ${relativeTime(sync.last_run_at)} — částečný`;
  } else if (sync.last_run_outcome === "success") {
    dot = <span className="w-2 h-2 rounded-full bg-green-500" />;
    label = `Poslední sync ${relativeTime(sync.last_run_at)}`;
  } else {
    dot = <span className="w-2 h-2 rounded-full bg-gray-300" />;
    label = "Nečinný";
  }
  return (
    <div className="flex items-center gap-2 px-3 py-1.5 rounded-md bg-gray-50 border border-gray-200">
      {dot}
      <span className="text-[13px] text-gray-700 font-medium">{label}</span>

function SyncNowPanel({ sync, onSync }) {
  const isRunning = sync.status === "running";
  const isTaskScheduler = sync.trigger === "task_scheduler";
  const p = sync.progress;
  const hasCounts = p && p.processed_count != null && p.total_count != null;
  const pct = hasCounts ? Math.max(4, Math.round((p.processed_count / p.total_count) * 100)) : null;

  return (
    <section className="bg-white rounded-lg border border-gray-200 shadow-sm p-6">
      <div className="flex items-start gap-6 flex-wrap">
        <div className="flex-1 min-w-0">
          <h2 className="text-sm font-semibold text-gray-900">Synchronizace</h2>
          <p className="text-[13px] text-gray-500 mt-1">
            Ruční stažení nahrávek z Plaud cloudu do místní složky.
          </p>
          {!isRunning && (
            <div className="mt-3 text-[13px] text-gray-600">
              {sync.last_run_at ? (
                <>Poslední běh <span className="text-gray-900 font-medium">{relativeTime(sync.last_run_at)}</span> · {formatExactTime(sync.last_run_at)}</>
              ) : (
                <>Ještě nikdy neproběhla.</>
              )}
            </div>
          )}
        </div>
        <div className="flex-shrink-0">
          <button
            type="button"
            disabled={isRunning}
            onClick={onSync}
            className={classNames(
              "inline-flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium shadow-sm transition-colors",
              isRunning
                ? "bg-blue-50 text-blue-700 border border-blue-200 cursor-not-allowed"
                : "bg-blue-600 text-white hover:bg-blue-700 border border-blue-600"
            )}
          >
            {isRunning ? (
              <>
                <svg viewBox="0 0 24 24" className="w-4 h-4 animate-spin" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round">
                  <path d="M21 12a9 9 0 1 1-6.2-8.55" />
                </svg>
                <span>{hasCounts ? `Synchronizace… ${p.processed_count} / ${p.total_count}` : "Synchronizace…"}</span>
              </>
            ) : (
              <>
                <svg viewBox="0 0 24 24" className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M3 12a9 9 0 0 1 15.5-6.3L21 8" />
                  <path d="M21 4v4h-4" />
                  <path d="M21 12a9 9 0 0 1-15.5 6.3L3 16" />
                  <path d="M3 20v-4h4" />
                </svg>
                <span>Synchronizovat</span>
              </>
            )}
          </button>
        </div>
      </div>

      {isRunning && (
        <div className="mt-5">
          <div className="flex items-center justify-between mb-2">
            <span className="text-[13px] font-medium text-gray-700">{phaseLabel(p)}</span>
            {hasCounts && (
              <span className="text-[13px] text-gray-500 font-mono">{p.processed_count} / {p.total_count}</span>
            )}
          </div>
          <div className="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden relative">
            {hasCounts ? (
              <div
                className="h-full bg-blue-500 rounded-full transition-all duration-500"
                style={{ width: `${pct}%` }}
              />
            ) : (
              <div className="h-full bg-blue-500 rounded-full ps-indeterminate" />
            )}
          </div>
          {isTaskScheduler && (
            <div className="mt-2 text-xs text-gray-500 flex items-center gap-1.5">
              <svg viewBox="0 0 24 24" className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>
              </svg>
              Spuštěno Plánovačem úloh Windows
            </div>
          )}
        </div>
      )}
    </section>
  );
}

function ProjectBadge({ project, classification }) {
  if (classification === "unclassified" || !project) {
    return (
      <span className="inline-flex items-center px-2 py-0.5 rounded-md text-[11px] font-medium bg-gray-100 text-gray-600 border border-gray-200">
        nezatříděno
      </span>
    );
  }
  // Stable color pick by project name — within blue family for "matched"
  const palette = [
    { bg: "bg-blue-50",   text: "text-blue-700",   border: "border-blue-200" },
    { bg: "bg-indigo-50", text: "text-indigo-700", border: "border-indigo-200" },
    { bg: "bg-sky-50",    text: "text-sky-700",    border: "border-sky-200" },
    { bg: "bg-violet-50", text: "text-violet-700", border: "border-violet-200" },
  ];
  let h = 0; for (let i = 0; i < project.length; i++) h = (h * 31 + project.charCodeAt(i)) >>> 0;
  const c = palette[h % palette.length];
  return (
    <span className={classNames("inline-flex items-center px-2 py-0.5 rounded-md text-[11px] font-medium border", c.bg, c.text, c.border)}>
      {project}
    </span>
  );
}

function YamlEditor({ value, onChange, error }) {
  const taRef = useRef(null);
  const lineNumsRef = useRef(null);
  const lines = value.split("\n");

  // Sync scroll between line numbers and textarea
  const onScroll = (e) => {
    if (lineNumsRef.current) {
      lineNumsRef.current.scrollTop = e.target.scrollTop;
    }
  };

  return (
    <div className={classNames(
      "rounded-md border bg-white overflow-hidden",
      error ? "border-red-300" : "border-gray-200"
    )}>
      <div className="flex">
        <div
          ref={lineNumsRef}
          className="yaml-line-numbers flex-shrink-0 bg-gray-50 border-r border-gray-100 text-right pr-3 pl-3 py-3 select-none overflow-hidden"
          style={{ height: 400, width: 48 }}
        >
          {lines.map((_, i) => (
            <div
              key={i}
              className={classNames(
                "transition-colors",
                error && error.line === i + 1 ? "text-red-600 font-semibold bg-red-50 -mx-3 px-3" : "text-gray-400"
              )}
            >
              {i + 1}
            </div>
          ))}
        </div>
        <textarea
          ref={taRef}
          value={value}
          onChange={(e) => onChange(e.target.value)}
          onScroll={onScroll}
          spellCheck={false}
          className="yaml-textarea flex-1 py-3 px-3 outline-none resize-none text-gray-800 bg-white"
          style={{ height: 400 }}
        />
      </div>
      {error && (
        <div className="border-t border-red-200 bg-red-50 px-4 py-2 text-[13px] text-red-800 flex items-center gap-2">
          <svg viewBox="0 0 24 24" className="w-4 h-4 text-red-600 flex-shrink-0" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/>
          </svg>
          <span><span className="font-mono font-semibold">Řádek {error.line}:</span> {error.message}</span>
        </div>
      )}
    </div>
  );
}

          error={store.yamlError}
        />
        <div className="flex items-center gap-3">
          <button
            type="button"
            disabled={store.savingConfig}
            onClick={store.saveConfig}
            className="inline-flex items-center gap-2 px-3.5 py-2 rounded-md text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white shadow-sm disabled:opacity-60"
          >
            {store.savingConfig ? (
              <svg viewBox="0 0 24 24" className="w-4 h-4 animate-spin" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><path d="M21 12a9 9 0 1 1-6.2-8.55"/></svg>
            ) : (
              <svg viewBox="0 0 24 24" className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <path d="M17 21v-8H7v8M7 3v5h8"/>
              </svg>
            )}
            Uložit
          </button>
          <button
            type="button"
            onClick={() => { store.setYaml(DEFAULT_YAML); store.setYamlError(null); store.pushToast("success", "Konfigurace načtena znovu"); }}
            className="inline-flex items-center gap-2 px-3.5 py-2 rounded-md text-sm font-medium border border-gray-200 bg-white hover:bg-gray-50 text-gray-700"
          >
            <svg viewBox="0 0 24 24" className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 12a9 9 0 0 1 15.5-6.3L21 8"/><path d="M21 4v4h-4"/>
            </svg>
            Načíst znovu
          </button>
          <span className="ml-auto text-xs text-gray-400 font-mono">{store.yaml.split("\n").length} řádků</span>
        </div>
      </div>
    </section>
  );
}

function Settings({ store }) {
  return (
    <div className="space-y-5">
      <ConnectionPanel store={store} />
      <ConfigPanel store={store} />
    </div>
  );
}

/* ---------- Dev panel ---------- */

function DevPanel({ store }) {
  const [open, setOpen] = useState(true);

  return (
    <div className="fixed bottom-4 left-4 z-40">
      {!open ? (
        <button
          type="button"
          onClick={() => setOpen(true)}
          className="px-2.5 py-1.5 rounded-md bg-gray-900 text-white text-[11px] font-mono shadow-md hover:bg-gray-800"
        >
          ▶ DEV
        </button>
      ) : (
        <div className="w-72 bg-gray-900 text-gray-100 rounded-lg shadow-md border border-gray-800 overflow-hidden font-mono text-[11px]">
          <div className="flex items-center justify-between px-3 py-2 bg-gray-950 border-b border-gray-800">
            <div className="flex items-center gap-2">
              <span className="w-1.5 h-1.5 rounded-full bg-green-400" />
              <span className="font-semibold tracking-wider">DEV PANEL</span>
            </div>
            <button onClick={() => setOpen(false)} className="text-gray-400 hover:text-white" aria-label="Collapse">
              <svg viewBox="0 0 24 24" className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6"/></svg>
            </button>
          </div>
          <div className="p-3 space-y-3">
            <div>
              <div className="text-gray-400 mb-1.5 uppercase tracking-wider text-[10px]">Scenario</div>
              <div className="grid grid-cols-2 gap-1">
                {Object.entries(SCENARIOS).map(([key, s]) => (
                  <button
                    key={key}
                    type="button"
                    onClick={() => store.switchScenario(key)}
                    className={classNames(
                      "px-2 py-1.5 rounded text-left leading-tight",
                      store.scenarioKey === key
                        ? "bg-blue-600 text-white"
                        : "bg-gray-800 hover:bg-gray-700 text-gray-200"
                    )}
                    title={s.desc}
                  >
                    {s.label}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <div className="text-gray-400 mb-1.5 uppercase tracking-wider text-[10px]">Toasts</div>
              <div className="grid grid-cols-2 gap-1">
                <button onClick={() => store.pushToast("success", "Synchronizace dokončena — 5 nových nahrávek")}
                  className="px-2 py-1.5 rounded bg-gray-800 hover:bg-gray-700">success</button>
                <button onClick={() => store.pushToast("error", "Synchronizaci se nepodařilo spustit")}
                  className="px-2 py-1.5 rounded bg-gray-800 hover:bg-gray-700">error</button>
              </div>
            </div>
            <div>
              <div className="text-gray-400 mb-1.5 uppercase tracking-wider text-[10px]">Banners</div>
              <div className="grid grid-cols-2 gap-1">
                <button onClick={() => store.forceBanner("token-expired")}
                  className="px-2 py-1.5 rounded bg-gray-800 hover:bg-gray-700">token expired</button>
                <button onClick={() => store.forceBanner("last-sync-failed")}
                  className="px-2 py-1.5 rounded bg-gray-800 hover:bg-gray-700">sync failed</button>
              </div>
            </div>
            <div>
              <div className="text-gray-400 mb-1.5 uppercase tracking-wider text-[10px]">Overlay</div>
              <div className="grid grid-cols-2 gap-1">
                <button onClick={() => store.setConnectionLost(true)}
                  className="px-2 py-1.5 rounded bg-gray-800 hover:bg-gray-700">show</button>
                <button onClick={() => store.setConnectionLost(false)}
                  className="px-2 py-1.5 rounded bg-gray-800 hover:bg-gray-700">hide</button>
              </div>
            </div>
            <div className="text-gray-500 text-[10px] pt-1 border-t border-gray-800">
              Visible only in dev — strip <span className="text-gray-300">DevPanel</span> from prod build.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- App shell ---------- */

function App() {
  const store = useAppStore();

  const onBannerAction = (b) => {
    if (b.actionTarget === "settings") store.setRoute("settings");
    else store.pushToast("success", "Otevřen plaudsync.log (mock)");
  };

  return (
    <div className="min-h-screen bg-gray-50 flex flex-col" data-screen-label={store.route === "dashboard" ? "01 Přehled" : "02 Nastavení"}>
      <Header route={store.route} setRoute={store.setRoute} sync={store.serverState.sync} />
      {/* data-screen-label uses Czech for clarity */}
      <BannerStack
        banners={store.banners}
        onDismiss={store.dismissBanner}
        onAction={onBannerAction}
      />
      <main className="flex-1">
        <div className="max-w-6xl mx-auto px-6 py-6">
          {store.route === "dashboard" ? <Dashboard store={store} /> : <Settings store={store} />}
        </div>
      </main>
      <ToastContainer toasts={store.toasts} onDismiss={store.dismissToast} />
      <ConnectionLostOverlay visible={store.connectionLost} onClose={() => store.setConnectionLost(false)} />
      <DevPanel store={store} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
